{% extends "base.html" %}

{% block title %}Registration Successful - Internship Hours Tracker{% endblock %}

{% block content %}
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md text-center">
        <!-- Success Icon -->
        <div class="mb-4">
            <div class="mx-auto w-16 h-16 bg-green-100 rounded-full flex items-center justify-center">
                <i class="fas fa-check text-green-600 text-3xl"></i>
            </div>
        </div>

        <!-- Success Message -->
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Registration Successful!</h1>
        <p class="text-gray-600 mb-6">
            Your account has been created successfully. You'll be redirected to the login page in a moment.
        </p>

        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 rounded-full h-2 mb-4 overflow-hidden">
            <div class="bg-green-600 h-full progress-bar" style="width: 100%;"></div>
        </div>

        <!-- Button -->
        <a href="{% url 'users:login' %}" class="inline-block bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-lg transition">
            Go to Login
        </a>
    </div>
</div>

<script>
    // Auto-redirect to login after 3 seconds
    setTimeout(function() {
        window.location.href = "{% url 'users:login' %}";
    }, 3000);

    // Animate progress bar
    const progressBar = document.querySelector('.progress-bar');
    let width = 100;
    const interval = setInterval(function() {
        width -= (100 / 30);
        progressBar.style.width = width + '%';
        if (width <= 0) {
            clearInterval(interval);
        }
    }, 100);
</script>
{% endblock %}
