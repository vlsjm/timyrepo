{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Internship Hours Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/design-tokens.css' %}">
    <style>
        /* Mobile-first approach - base styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
        
        .progress-bar {
            transition: width 0.3s ease;
        }
        
        .sidebar {
            position: fixed;
            left: -100%;
            top: 0;
            width: 100%;
            height: 100vh;
            background: white;
            z-index: 40;
            transition: left 0.3s ease;
            overflow-y: auto;
        }
        
        .sidebar.active {
            left: 0;
        }
        
        /* Tablet and up */
        @media (min-width: 768px) {
            .sidebar {
                position: relative;
                left: 0;
                width: 250px;
                height: 100vh;
            }
            
            .sidebar.active {
                left: 0;
            }
            
            .main-content {
                margin-left: 250px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50">
    <div class="flex flex-col">
        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Modern Navigation Bar -->
    {% if user.is_authenticated %}
    <nav class="fixed bottom-0 left-0 right-0 md:bottom-auto md:top-0 bg-white md:border-b border-gray-200 z-50 md:px-6 md:py-4">
        <div class="max-w-7xl mx-auto">
            <!-- Desktop Navigation -->
            <div class="hidden md:flex justify-between items-center">
                <div class="flex items-center gap-8">
                    <a href="{% url 'dashboard' %}" class="flex items-center gap-2 {% if request.resolver_match.app_name == 'users' and request.resolver_match.url_name == 'index' %}text-red-600 font-semibold{% else %}text-gray-700 hover:text-gray-900{% endif %} transition" title="Dashboard">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-3m0 0l7-4 7 4M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9m-9 11l4-4m0 0l4 4m-4-4v4"></path>
                        </svg>
                    </a>
                    <a href="{% url 'logging_app:log_hours' %}" class="flex items-center gap-2 {% if request.resolver_match.app_name == 'logging_app' and request.resolver_match.url_name == 'log_hours' %}text-red-600 font-semibold{% else %}text-gray-700 hover:text-gray-900{% endif %} transition" title="Log Hours">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </a>
                </div>

                <!-- Center Brand/Logo -->
                <a href="{% url 'dashboard' %}" class="flex-1 flex justify-center">
                    <div class="bg-red-500 hover:bg-red-600 text-white rounded-full p-4 transition shadow-lg hover:shadow-xl">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M13 6v2h3v13H8V8h3V6M4 2h16a2 2 0 012 2v16a2 2 0 01-2 2H4a2 2 0 01-2-2V4a2 2 0 012-2z"></path>
                        </svg>
                    </div>
                </a>

                <div class="flex items-center gap-8">
                    <a href="{% url 'logging_app:logs' %}" class="flex items-center gap-2 {% if request.resolver_match.url_name == 'logs' %}text-red-600 font-semibold{% else %}text-gray-700 hover:text-gray-900{% endif %} transition" title="My Logs">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </a>
                    <a href="{% url 'users:profile' %}" class="flex items-center gap-2 {% if request.resolver_match.url_name == 'profile' %}text-red-600 font-semibold{% else %}text-gray-700 hover:text-gray-900{% endif %} transition" title="Profile">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </a>
                </div>
            </div>

            <!-- Mobile Navigation -->
            <div class="md:hidden flex justify-around items-center py-2">
                <a href="{% url 'dashboard' %}" class="flex flex-col items-center gap-1 {% if request.resolver_match.app_name == 'users' and request.resolver_match.url_name == 'index' %}text-red-600 font-semibold{% else %}text-gray-700 hover:text-gray-900{% endif %} p-2 transition" title="Dashboard">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-3m0 0l7-4 7 4M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9m-9 11l4-4m0 0l4 4m-4-4v4"></path>
                    </svg>
                    <span class="text-xs">Home</span>
                </a>

                <a href="{% url 'reports:dashboard' %}" class="flex flex-col items-center gap-1 {% if request.resolver_match.app_name == 'reports' %}text-red-600 font-semibold{% else %}text-gray-700 hover:text-gray-900{% endif %} p-2 transition" title="Reports">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    <span class="text-xs">Reports</span>
                </a>

                <a href="{% url 'logging_app:log_hours' %}" class="flex flex-col items-center gap-1 {% if request.resolver_match.url_name == 'log_hours' %}text-red-600 font-semibold{% else %}text-gray-700 hover:text-gray-900{% endif %} p-2 -mt-6 transition" title="Log Hours">
                    <div class="bg-red-500 hover:bg-red-600 text-white rounded-full p-3 transition shadow-lg">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M13 6v2h3v13H8V8h3V6M4 2h16a2 2 0 012 2v16a2 2 0 01-2 2H4a2 2 0 01-2-2V4a2 2 0 012-2z"></path>
                        </svg>
                    </div>
                    <span class="text-xs" style="margin-top: 4px;">Log</span>
                </a>

                <a href="{% url 'logging_app:logs' %}" class="flex flex-col items-center gap-1 {% if request.resolver_match.url_name == 'logs' %}text-red-600 font-semibold{% else %}text-gray-700 hover:text-gray-900{% endif %} p-2 transition" title="My Logs">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <span class="text-xs">Logs</span>
                </a>

                <a href="{% url 'users:profile' %}" class="flex flex-col items-center gap-1 {% if request.resolver_match.url_name == 'profile' %}text-red-600 font-semibold{% else %}text-gray-700 hover:text-gray-900{% endif %} p-2 transition" title="Profile">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    <span class="text-xs">Profile</span>
                </a>
            </div>
        </div>
    </nav>
    {% endif %}

    <!-- Spacer for fixed navbar -->
    <div class="h-16 md:h-20"></div>

    {% block extra_js %}{% endblock %}
</body>
</html>
